<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fancode Live Matches</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: #000;
    color: #fff;
    font-family: 'Roboto', sans-serif;
}

.file-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.match-item {
    background: #111;
    padding: 15px;
    border-radius: 12px;
    width: 260px;
    text-align: center;
    transition: 0.3s;
}

.match-item:hover {
    transform: scale(1.03);
}

.match-item img {
    width: 100%;
    border-radius: 10px;
}

/* 🔥 WATCH BUTTON */
.watch-btn {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #ff3c00, #ff7a00);
  color: #fff;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
}

.watch-btn:hover {
  transform: scale(1.05);
}

/* 🔥 POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.popup-box {
  background: #111;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 360px;
  text-align: center;
}

.quality-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.q-btn {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.q-btn:hover {
  background: #ff3c00;
}

.q-btn.hd {
  background: #ff3c00;
}

.close-btn {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  background: #333;
  border: none;
  border-radius: 8px;
  color: #fff;
}
</style>
</head>

<body>

<h2 style="text-align:center;">FANCODE LIVE</h2>
<div class="file-container" id="matches"></div>

<script>
const playerURL = 'https://fancodebyfinally.pages.dev/fancodeplayer?url=';
const apiURL = 'https://raw.githubusercontent.com/doctor-8trange/zyphx8/refs/heads/main/data/fancode.json'; // replace

fetch(apiURL)
.then(res => res.json())
.then(data => {

    const container = document.getElementById('matches');

    data.matches.forEach(match => {

        const card = document.createElement('div');
        card.className = 'match-item';

        const team1 = match.team?.[0]?.shortName || '';
        const team2 = match.team?.[1]?.shortName || '';

        card.innerHTML = `
            <img src="${match.image}">
            <h3>${match.tournament}</h3>
            <p>${team1} vs ${team2}</p>
            <p>${match.status}</p>
            <button class="watch-btn">▶ Watch Now</button>
        `;

        card.querySelector('.watch-btn').onclick = () => {

            const auto = match.auto_streams?.[0]?.auto;

            if (!auto) {
                alert("No streams available");
                return;
            }

            const lines = auto.split('\n');
            let streams = [];

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('RESOLUTION')) {

                    const res = lines[i].match(/RESOLUTION=\d+x(\d+)/);
                    const quality = res ? res[1] + "p" : "Auto";
                    const url = lines[i + 1];

                    streams.push({ quality, url });
                }
            }

            // 🔥 POPUP
            let popup = document.createElement('div');
            popup.className = 'popup';

            let box = document.createElement('div');
            box.className = 'popup-box';

            box.innerHTML = `<h3>Select Quality</h3>`;

            let grid = document.createElement('div');
            grid.className = 'quality-grid';

            streams.forEach(s => {
                let btn = document.createElement('button');
                btn.className = 'q-btn';

                if (s.quality.includes("720") || s.quality.includes("1080")) {
                    btn.classList.add('hd');
                }

                btn.innerText = s.quality;

                btn.onclick = () => {
                    window.location.href = playerURL + encodeURIComponent(s.url);
                };

                grid.appendChild(btn);
            });

            let close = document.createElement('button');
            close.className = 'close-btn';
            close.innerText = "Close";
            close.onclick = () => popup.remove();

            box.appendChild(grid);
            box.appendChild(close);
            popup.appendChild(box);
            document.body.appendChild(popup);
        };

        container.appendChild(card);
    });

});
</script>

</body>
</html>
