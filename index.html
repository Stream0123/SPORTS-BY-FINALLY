<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<link rel="shortcut icon" href="https://drmlive.in/sports/fancode.png" />
<title>Fancode Live Matches</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@400;700&display=swap">

<style>
/* ✅ YOUR ORIGINAL DESIGN (UNCHANGED) */
body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background-color: #000;
    color: #fff;
}
.file-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}
.match-item {
    margin: 10px;
    text-align: center;
    border-radius: 8px;
    overflow: hidden;
    background-color: #1a1a1a;
    padding: 20px;
    width: calc(25% - 20px);
}
.match-item img {
    max-width: 100%;
}
.match-item h3 { margin-bottom: 10px; }
.match-item p { margin-bottom: 10px; }

.watch-btn {
    padding:10px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<h1 style="text-align:center;">FANCODE LIVE</h1>
<div class="file-container" id="matches"></div>

<script>
const playerURL = 'player.html?url=';
const apiURL = 'YOUR_JSON_URL_HERE'; // 👈 put your JSON

fetch(apiURL)
.then(res => res.json())
.then(data => {

    const container = document.getElementById('matches');

    data.matches.forEach(match => {

        const card = document.createElement('div');
        card.className = 'match-item';

        const team1 = match.team?.[0]?.shortName || '';
        const team2 = match.team?.[1]?.shortName || '';

        card.innerHTML = `
            <img src="${match.image}">
            <h3>${match.tournament}</h3>
            <p>${team1} vs ${team2}</p>
            <p>${match.status}</p>
            <button class="watch-btn">Watch Now</button>
        `;

        // 🔥 WATCH BUTTON CLICK
        card.querySelector('.watch-btn').onclick = () => {

            const auto = match.auto_streams?.[0]?.auto;

            if (!auto) {
                alert("No streams available");
                return;
            }

            const lines = auto.split('\n');
            let streams = [];

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('RESOLUTION')) {

                    const resMatch = lines[i].match(/RESOLUTION=\d+x(\d+)/);
                    const quality = resMatch ? resMatch[1] + "p" : "Auto";
                    const url = lines[i + 1];

                    streams.push({ quality, url });
                }
            }

            // 🔥 POPUP
            let popup = document.createElement('div');
            popup.style = `
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                background:rgba(0,0,0,0.8);
                display:flex;
                justify-content:center;
                align-items:center;
                z-index:9999;
            `;

            let box = document.createElement('div');
            box.style = `
                background:#111;
                padding:20px;
                border-radius:10px;
                text-align:center;
            `;

            streams.forEach(s => {
                let btn = document.createElement('button');
                btn.innerText = s.quality;
                btn.style = `
                    margin:5px;
                    padding:10px;
                    background:red;
                    color:white;
                    border:none;
                    cursor:pointer;
                `;

                btn.onclick = () => {
                    window.location.href = playerURL + encodeURIComponent(s.url);
                };

                box.appendChild(btn);
            });

            let close = document.createElement('button');
            close.innerText = "Close";
            close.style = "display:block;margin-top:10px;";
            close.onclick = () => popup.remove();

            box.appendChild(close);
            popup.appendChild(box);
            document.body.appendChild(popup);
        };

        container.appendChild(card);
    });

})
.catch(err => console.error(err));
</script>

</body>
</html>
