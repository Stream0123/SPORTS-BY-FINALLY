<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports Player</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}
.shaka-video-container{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
video{
  width:100%;
  height:100%;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">
  <video id="video" autoplay playsinline></video>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    alert("Browser not supported");
    return;
  }

  const video = document.getElementById("video");
  const container = document.getElementById("player-container");

  const player = new shaka.Player(video);

  // UI Controls
  const ui = new shaka.ui.Overlay(player, container, video);
  ui.configure({
    controlPanelElements: [
      "mute",
      "play_pause",
      "time_and_duration",
      "spacer",
      "quality",
      "fullscreen"
    ]
  });

  // DRM + Streaming Config
  player.configure({
    drm: {
      clearKeys: {
        "5d81e9cefbae4c3da41e4097fae68a52": "ffec5a69e120f94f8533f5059724f08c"
      }
    },
    streaming: {
      lowLatencyMode: true,
      bufferingGoal: 10,
      rebufferingGoal: 2
    }
  });

  // Only Referer header
  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers["Referer"] = "https://fancode.com/";
  });

  // Load stream
  try {
    await player.load("https://in-mc-fblive.fancode.com/mumbai/140502_english_dash_73093_1drmta-di_h264/index.mpd");
    video.play();
  } catch (e) {
    console.error("Error loading stream:", e);
  }

});
</script>

</body>
</html>
