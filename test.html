<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandboxed Iframe</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>
<body>

<iframe
    src="https://streamfree.app/embed/cricket/cricketsky?quality=1080p&category=cricket"
    
    sandbox="
        allow-scripts
        allow-same-origin
        allow-forms
        allow-popups
        allow-downloads
        allow-presentation
    "

    allowfullscreen
    referrerpolicy="no-referrer">
</iframe>

</body>
</html>
