<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player By  @Finally_Live_Streaming</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
html, body {
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
}

.shaka-video-container {
  position:absolute;
  inset:0;
}

video {
  width:100%;
  height:100%;
  object-fit:contain;
}

/* hide spinner only */
.shaka-spinner-container,
.shaka-spinner,
.shaka-spinner-svg {
  display:none !important;
}
</style>
</head>

<body>

<!-- ⚠️ KEEP AUTO UI (IMPORTANT) -->
<div class="shaka-video-container"
     data-shaka-player
     data-shaka-player-container
     shaka-controls="true">

  <video autoplay playsinline preload="metadata" class="shaka-video"></video>

</div>

<script src="mpdstream.js"></script>
<script>
if (confirm("Join Our Telegram Channel @Finally_Live_Streaming")) {
  window.open("https://telegram.me/Finally_Live_Streaming", '_blank');
}
</script>
<script>
document.addEventListener('DOMContentLoaded', async () => {

  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    alert("Browser not supported");
    return;
  }

  const video = document.querySelector('video');

  // ⚠️ IMPORTANT: use auto UI player
  const player = video['shakaPlayer'];

  // 🔥 GET STREAM ID
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id || !STREAMS[id]) {
    alert("Invalid stream ID");
    return;
  }

  const stream = STREAMS[id];

  // 🔥 KEEP FULL UI SETTINGS (NO REMOVAL)
  player.configure({
    drm: {
      clearKeys: {
        [stream.keyId]: stream.key
      }
    },
    streaming: {
      lowLatencyMode: true,
      bufferingGoal: 15,
      rebufferingGoal: 2,
      bufferBehind: 15,
      retryParameters: {
        timeout: 10000,
        maxAttempts: 5,
        baseDelay: 300,
        backoffFactor: 1.2
      }
    },
    manifest: {
      retryParameters: {
        timeout: 8000,
        maxAttempts: 3
      }
    }
  });

  player.addEventListener('error', e => {
    console.error('Error:', e.detail);
  });

  try {
    await player.load(stream.mpd);
    console.log("Loaded:", id);
  } catch (err) {
    console.error("Load failed:", err);
  }

});
</script>

</body>
</html>
