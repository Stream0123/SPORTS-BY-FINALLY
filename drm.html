<!DOCTYPE html>
<html lang="en">
<head>
  <title>Stream By @Finally_Live_Streaming</title>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.8.8/shaka-player.ui.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.3/controls.min.css" rel="stylesheet">

  <!-- External Streams -->
  <script src="streams.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
    }
    video {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<div data-shaka-player-container style="width:100%; height:100vh;">
  <video autoplay playsinline data-shaka-player id="video"></video>
</div>
<script>
if (confirm("Join Our Telegram Channel @Finally_Live_Streaming")) {
  window.open("https://telegram.me/Finally_Live_Streaming", '_blank');
}
</script>
<script>


/* Get stream ID from URL */
function getStreamId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id") || "M1";
}

async function init() {
  const video = document.getElementById('video');
  const ui = video['ui'];
  const controls = ui.getControls();
  const player = controls.getPlayer();

  const streamId = getStreamId();
  const stream = STREAMS[streamId];

  if (!stream) {
    alert("Invalid Stream ID!");
    return;
  }

  /* Set Poster */
  video.poster = stream.poster || "";

  /* UI Config */
  ui.configure({
    controlPanelElements: [
      'play_pause',
      'time_and_duration',
      'spacer',
      'mute',
      'volume',
      'picture_in_picture',
      'playback_rate',
      'quality',
      'fullscreen'
    ],
    playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2]
  });

  /* DRM Config from external file */
  player.configure({
    drm: {
      clearKeys: {
        [stream.keyId]: stream.key
      }
    }
  });

  /* Error Handling */
  player.addEventListener('error', e => console.error("Player Error:", e));
  controls.addEventListener('error', e => console.error("UI Error:", e));

  /* Load Stream */
  try {
    await player.load(stream.mpd);
    console.log("Loaded stream:", streamId);
  } catch (error) {
    console.error("Load failed:", error);
  }
}

/* Init Player */
document.addEventListener('shaka-ui-loaded', init);
document.addEventListener('shaka-ui-load-failed', e => console.error(e));

</script>

</body>
</html>
