<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player By  @Finally_Live_Streaming</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
html, body {
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
}

.shaka-video-container {
  position:absolute;
  inset:0;
}

video {
  width:100%;
  height:100%;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="shaka-video-container">
  <video id="video" autoplay playsinline></video>
</div>

<script src="mpdstream.js"></script>


  <script>
if (confirm("Join Our Telegram Channel @Finally_Live_Streaming")) {
  window.open("https://telegram.me/Finally_Live_Streaming", '_blank');
}
</script>
<script>
document.addEventListener('DOMContentLoaded', async () => {

  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    alert("Browser not supported");
    return;
  }

  const video = document.getElementById("video");
  const player = new shaka.Player(video);

  const container = document.querySelector('.shaka-video-container');
  const ui = new shaka.ui.Overlay(player, container, video);

  ui.configure({
    controlPanelElements: [
      'play_pause',
      'time_and_duration',
      'spacer',
      'fullscreen'
    ]
  });

  // 🔥 GET ID FROM URL
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id || !STREAMS[id]) {
    alert("Invalid stream ID");
    return;
  }

  const stream = STREAMS[id];

  // 🔥 DRM CONFIG FROM JS FILE
  player.configure({
    drm: {
      clearKeys: {
        [stream.keyId]: stream.key
      }
    },
    streaming: {
      lowLatencyMode: true,
      bufferingGoal: 15,
      rebufferingGoal: 2,
      bufferBehind: 15
    }
  });

  try {
    await player.load(stream.mpd);
    console.log("Stream loaded:", id);
  } catch (e) {
    console.error("Error:", e);
  }

});
</script>

</body>
</html>
