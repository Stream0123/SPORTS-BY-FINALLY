<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>@Finally_Live_Streaming</title>

<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>
body {
  margin:0;
  padding:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  height:100%;
  width:100%;
}

.video-container {
  position:absolute;
  width:100%;
  height:100%;
  background:#000;
}

.shaka-video-container {
  position:absolute;
  width:100%;
  height:100%;
}

video {
  width:100%;
  height:100%;
  background:#000;
}

/* Hide unwanted controls */
.shaka-mute-button,
.shaka-volume-bar-container,
.shaka-overflow-menu-button,
.shaka-resolution-button,
.shaka-back-to-overflow-button {
  display:none !important;
}
</style>
</head>

<body>

<div class="video-container">
  <div class="shaka-video-container" data-shaka-player-container>
    <video id="video" autoplay playsinline preload="auto"></video>
  </div>
</div>

<script>
const queryParams = new URLSearchParams(window.location.search);
const url = queryParams.get('url');

const channelstreamInfo = {
  streamUrl: url,
  authBearer: "",
  streamPoster: ""
};

let player;
const video = document.getElementById('video');

async function initializePlayer() {
  try {
    player = new shaka.Player();
    await player.attach(video);

    const container = document.querySelector('.shaka-video-container');
    const ui = new shaka.ui.Overlay(player, container, video);

    const config = {
      controlPanelElements: [
        'play_pause',
        'time_and_duration',
        'spacer',
        'fullscreen'
      ]
    };

    ui.configure(config);

    player.configure({
      streaming: {
        bufferingGoal: 10,
        rebufferingGoal: 2,
        bufferBehind: 30
      }
    });

    video.autoplay = true;
    video.controls = false;

    await player.load(channelstreamInfo.streamUrl);

    const attemptAutoplay = async () => {
      try {
        await video.play();
      } catch {
        video.muted = true;
        await video.play();
      }
    };

    if (video.readyState >= 2) {
      await attemptAutoplay();
    } else {
      video.addEventListener('canplay', attemptAutoplay, { once: true });
    }

  } catch (error) {
    video.src = channelstreamInfo.streamUrl;
    video.autoplay = true;
    try {
      await video.play();
    } catch {
      video.muted = true;
      await video.play();
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initializePlayer();
});
</script>

<script>
if (confirm("Join Our Telegram Channel @Finally_Live_Streaming")) {
  window.open("https://telegram.me/Finally_Live_Streaming", '_blank');
}
</script>

</body>
</html>
