<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Famcode</title>

<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>

body{
margin:0;
background:#000;
height:100%;
}

html{
height:100%;
}

.shaka-video-container{
width:100%;
height:100%;
}

video{
width:100%;
height:100%;
}

</style>

</head>

<body>

<div class="video-container">
  <div class="shaka-video-container" data-shaka-player data-shaka-player-container>
    <video id="video" autoplay playsinline preload="auto" class="shaka-video"></video>
  </div>
</div>

<script>
const queryParams = new URLSearchParams(window.location.search);
const url = queryParams.get('url');

const channelstreamInfo = {
  streamUrl: url,
  authBearer: "",
  streamPoster: ""
};

let player;
const video = document.getElementById('video');

async function initializePlayer() {
  try {
    // Initialize Shaka Player
    player = new shaka.Player();
    await player.attach(video);

    const container = document.querySelector('.shaka-video-container');
    const ui = new shaka.ui.Overlay(player, container, video);

    const config={

addSeekBar:false,

controlPanelElements:[
'play_pause',
'mute',
'time_and_duration',
'restart',
'spacer',
'picture_in_picture',
'fullscreen'
]

};

ui.configure(config);


/* PLAYER CONFIG */

player.configure({

streaming:{
bufferingGoal:10,
rebufferingGoal:2,
bufferBehind:30
},

manifest:{
retryParameters:{
timeout:30000,
maxAttempts:2,
baseDelay:1000,
backoffFactor:2,
fuzzFactor:0.5
}

}

});


    video.autoplay = true;
    video.controls = false;
    video.volume = 1;
    video.muted = false;
    video.preload = 'auto';

    console.log(`Loading stream: ${channelstreamInfo.streamUrl}`);

    // Load stream
    await player.load(channelstreamInfo.streamUrl);

    console.log('Stream loaded successfully.');

    const attemptAutoplay = async () => {
      try {
        await video.play();
      } catch (playError) {
        video.muted = true;
        try {
          await video.play();
        } catch (mutedError) {
          console.log('User interaction required');
        }
      }
    };

    if (video.readyState >= 2) {
      await attemptAutoplay();
    } else {
      video.addEventListener('canplay', attemptAutoplay, { once: true });
    }

  } catch (error) {
    console.error('Error initializing player:', error);

    // Fallback (same logic)
    video.src = channelstreamInfo.streamUrl;
    video.autoplay = true;
    video.muted = false;

    try {
      await video.play();
    } catch {
      video.muted = true;
      await video.play();
    }
  }
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  initializePlayer();
});
</script>

<script>
if (confirm("Join Our Telegram Channel @Finally_Live_Streaming")) {
  window.open("https://telegram.me/Finally_Live_Streaming", '_blank');
}
</script>

</body>
</html>
