<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jio by  @Finally_Live_Streaming</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.8.8/shaka-player.ui.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.3/controls.min.css" rel="stylesheet">

<style>
body { margin:0; background:black; }
video { width:100%; height:100%; }
</style>
</head>

<body>

<div id="playerContainer" data-shaka-player-container style="width:100%; height:100vh;">
  <video id="video" autoplay playsinline></video>
</div>

<div id="errorOverlay"><span id="errorMsg"></span><button id="retryBtn">Retry</button></div>
<div id="toast"></div>

<script>
const CONFIG = {
  telegramLink: "https://telegram.me/Finally_Live_Streaming",
  channelsEndpoint: "channels.json"
};

/* ✅ NEW: ID ALIAS MAPPING (ONLY CHANGE) */
function normalizeId(id) {
  if (!id) return id;
  const map = {
    SD: "sidhu",
    SD2: "sidhu2"
  };
  return map[id.toUpperCase()] || id;
}

let channelsCache = null;

const DOM = {
  video: document.getElementById("video"),
  playerContainer: document.getElementById("playerContainer"),
  errorOverlay: document.getElementById("errorOverlay"),
  errorMsg: document.getElementById("errorMsg"),
  retryBtn: document.getElementById("retryBtn"),
  toast: document.getElementById("toast")
};

let player = null;
let ui = null;

function showError(msg){
  DOM.errorMsg.textContent = msg;
  DOM.errorOverlay.style.display = "block";
}

function hideError(){
  DOM.errorOverlay.style.display = "none";
}

async function getChannels() {
  if (channelsCache) return channelsCache;

  const res = await fetch(CONFIG.channelsEndpoint);
  const data = await res.json();

  channelsCache = data.channels || data;
  return channelsCache;
}

function extractCookieFromUrl(url) {
  const match = url.match(/[?&](__hdnea__=[^&]+)/);
  return match ? match[1] : null;
}

function stripHdneaFromUrl(url) {
  const [base, query] = url.split("?");
  if (!query) return url;
  const remaining = query.split("&").filter(p => !p.startsWith("__hdnea__=")).join("&");
  return remaining ? base + "?" + remaining : base;
}

async function loadShakaPlayer(channel, cookie) {

  if (!ui) {
    ui = new shaka.ui.Overlay(new shaka.Player(DOM.video), DOM.playerContainer, DOM.video);
    player = ui.getControls().getPlayer();
  }

  player.configure({
    drm: {
      clearKeys: {
        [channel.clearKey.keyId]: channel.clearKey.key
      }
    }
  });

  player.getNetworkingEngine().clearAllRequestFilters();

  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers["Referer"] = "https://www.jiotv.com/";
    request.headers["User-Agent"] = "plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0";

    if (cookie) {
      request.headers["Cookie"] = cookie;
    }

    if (
      cookie &&
      (type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
       type === shaka.net.NetworkingEngine.RequestType.SEGMENT)
    ) {
      if (!request.uris[0].includes("__hdnea__=")) {
        request.uris[0] += (request.uris[0].includes("?") ? "&" : "?") + cookie;
      }
    }
  });

  const loadUrl = cookie ? stripHdneaFromUrl(channel.streamUrl) : channel.streamUrl;
  await player.load(loadUrl);
}

async function startPlayer() {
  try {
    const channels = await getChannels();

    const params = new URLSearchParams(window.location.search);
    let requestedId = params.get("id") || "";

    /* ✅ APPLY MAPPING HERE */
    requestedId = normalizeId(requestedId);

    /* case insensitive match */
    let resolvedId = Object.keys(channels).find(
      k => k.toLowerCase() === requestedId.toLowerCase()
    );

    if (!resolvedId) {
      resolvedId = Object.keys(channels)[0];
    }

    const channel = channels[resolvedId];
    if (!channel) {
      showError("Invalid ID");
      return;
    }

    const cookie = extractCookieFromUrl(channel.streamUrl);

    document.title = channel.name + " - BigCric";

    await loadShakaPlayer(channel, cookie);

  } catch (e) {
    showError(e.message);
  }
}

DOM.retryBtn.addEventListener("click", startPlayer);

shaka.polyfill.installAll();
startPlayer();

</script>

</body>
</html>
